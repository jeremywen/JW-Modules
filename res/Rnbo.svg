<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="120" height="380" viewBox="0 0 120 380">
  <defs>
    <style>
      .panel { fill: #2a2a2a; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 9px; fill: #cccccc; text-anchor: middle; }
      .port-circle { fill: none; stroke: #555555; stroke-width: 0.5; }
    </style>
  </defs>
  
  <!-- Background panel -->
  <rect class="panel" x="0" y="0" width="120" height="380"/>
  
  <!-- Top border accent -->
  <rect x="0" y="0" width="120" height="2" fill="#444444"/>
  
  <!-- Title -->
  <text class="title" x="60" y="25">RNBO</text>
  
  <!-- Input labels and visual guides -->
  <g id="inputs">
    <!-- Input 1 -->
    <text class="label" x="12" y="65">1</text>
    <circle class="port-circle" cx="25" cy="60" r="3.5"/>
    
    <!-- Input 2 -->
    <text class="label" x="12" y="105">2</text>
    <circle class="port-circle" cx="25" cy="100" r="3.5"/>
    
    <!-- Input 3 -->
    <text class="label" x="12" y="145">3</text>
    <circle class="port-circle" cx="25" cy="140" r="3.5"/>
    
    <!-- Input 4 -->
    <text class="label" x="12" y="185">4</text>
    <circle class="port-circle" cx="25" cy="180" r="3.5"/>
    
    <!-- Input 5 -->
    <text class="label" x="12" y="225">5</text>
    <circle class="port-circle" cx="25" cy="220" r="3.5"/>
    
    <!-- Input 6 -->
    <text class="label" x="12" y="265">6</text>
    <circle class="port-circle" cx="25" cy="260" r="3.5"/>
    
    <!-- Input 7 -->
    <text class="label" x="12" y="305">7</text>
    <circle class="port-circle" cx="25" cy="300" r="3.5"/>
    
    <!-- Input 8 -->
    <text class="label" x="12" y="345">8</text>
    <circle class="port-circle" cx="25" cy="340" r="3.5"/>
  </g>
  
  <!-- Output labels and visual guides -->
  <g id="outputs">
    <!-- Output 1 -->
    <text class="label" x="108" y="65">1</text>
    <circle class="port-circle" cx="95" cy="60" r="3.5"/>
    
    <!-- Output 2 -->
    <text class="label" x="108" y="105">2</text>
    <circle class="port-circle" cx="95" cy="100" r="3.5"/>
    
    <!-- Output 3 -->
    <text class="label" x="108" y="145">3</text>
    <circle class="port-circle" cx="95" cy="140" r="3.5"/>
    
    <!-- Output 4 -->
    <text class="label" x="108" y="185">4</text>
    <circle class="port-circle" cx="95" cy="180" r="3.5"/>
    
    <!-- Output 5 -->
    <text class="label" x="108" y="225">5</text>
    <circle class="port-circle" cx="95" cy="220" r="3.5"/>
    
    <!-- Output 6 -->
    <text class="label" x="108" y="265">6</text>
    <circle class="port-circle" cx="95" cy="260" r="3.5"/>
    
    <!-- Output 7 -->
    <text class="label" x="108" y="305">7</text>
    <circle class="port-circle" cx="95" cy="300" r="3.5"/>
    
    <!-- Output 8 -->
    <text class="label" x="108" y="345">8</text>
    <circle class="port-circle" cx="95" cy="340" r="3.5"/>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="378" width="120" height="2" fill="#444444"/>
  
  <!-- Center divider line (subtle) -->
  <line x1="60" y1="40" x2="60" y2="360" stroke="#444444" stroke-width="0.5" opacity="0.3"/>
  
</svg>
